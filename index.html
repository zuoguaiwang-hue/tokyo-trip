<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiki & Lala 旅遊小秘書</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --lala-pink: #FFC8DD;
            --kiki-blue: #BDE0FE;
            --star-yellow: #FFF9C4;
        }
        body {
            font-family: 'Quicksand', 'Itim', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #e0f2fe 100%);
            overscroll-behavior: none;
        }
        .app-shell {
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 24px;
            border: 2px solid #ffffff;
            box-shadow: 0 8px 20px rgba(255, 182, 193, 0.1);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        /* 滾輪式時間輸入模擬樣式 */
        .time-picker-wrapper {
            position: relative;
            background: #fff;
            border-radius: 12px;
            padding: 4px 10px;
            border: 2px solid #fce7f3;
            display: inline-flex;
            align-items: center;
        }
        .time-picker-wrapper input[type="time"] {
            background: transparent;
            border: none;
            outline: none;
            font-weight: 700;
            color: #f472b6;
            font-size: 0.875rem;
        }

        .day-tab.active {
            background: var(--lala-pink);
            color: white;
            box-shadow: 0 4px 10px rgba(255, 200, 221, 0.4);
        }

        /* 購買清單刪除線 */
        .checked-item {
            text-decoration: line-through;
            color: #d1d5db;
        }
    </style>
</head>
<body class="flex justify-center items-center">

<div id="app" class="app-shell w-full relative flex flex-col overflow-hidden shadow-2xl">
    
    <header class="pt-10 pb-2 px-8 flex justify-between items-end">
        <div>
            <p class="text-[10px] text-pink-400 font-bold tracking-widest mb-1">HELLO, TRAVELLER!</p>
            <h1 class="text-2xl font-bold text-gray-700">{{ settings.destination }}</h1>
        </div>
        <button @click="showSettings = true" class="w-10 h-10 rounded-full bg-white shadow-sm flex justify-center items-center text-pink-300">
            <i data-lucide="sparkles"></i>
        </button>
    </header>

    <div v-if="activeTab === 'itinerary'" class="px-6 py-3">
        <div class="flex gap-2 overflow-x-auto no-scrollbar pb-2">
            <button v-for="day in totalDays" :key="day" @click="activeDay = day"
                :class="['day-tab px-4 py-2 rounded-2xl text-xs font-bold whitespace-nowrap transition-all border-2 border-white', 
                        activeDay === day ? 'active' : 'bg-white/60 text-gray-400']">
                Day {{ day }}
            </button>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <div v-if="activeTab === 'itinerary'" class="space-y-4">
            <div class="flex justify-between items-center">
                <span class="text-xs font-bold text-blue-400 bg-blue-50 px-3 py-1 rounded-lg">
                    {{ getDayDate(activeDay) }}
                </span>
                <button @click="addActivity" class="text-xs font-bold text-pink-500">+ 新增景點</button>
            </div>

            <div v-for="(act, index) in currentDayActivities" :key="index" class="glass-card p-4 space-y-3">
                <div class="flex items-center gap-3">
                    <div class="time-picker-wrapper">
                        <input type="time" v-model="act.time">
                    </div>
                    <input v-model="act.location" placeholder="要去哪裡呢？" class="flex-1 bg-transparent border-b border-pink-100 font-bold text-gray-700 outline-none focus:border-pink-300">
                </div>
                <div class="relative">
                    <i data-lucide="pencil-line" class="absolute left-2 top-2.5 w-3 h-3 text-gray-300"></i>
                    <textarea v-model="act.note" placeholder="寫下小提醒..." rows="1" class="w-full bg-gray-50/50 rounded-xl p-2 pl-7 text-xs text-gray-500 outline-none focus:bg-white transition"></textarea>
                </div>
                <div class="flex justify-between items-center pt-1">
                    <button @click="goMap(act.location)" class="text-[10px] text-blue-400 font-bold">開啟導航</button>
                    <button @click="removeActivity(index)" class="text-gray-300"><i data-lucide="trash" class="w-3 h-3"></i></button>
                </div>
            </div>
        </div>

        <div v-if="activeTab === 'shopping'" class="space-y-4 pt-4">
            <h2 class="text-lg font-bold text-gray-600 mb-4">想要買的東西 🛍️</h2>
            <div class="flex gap-2 mb-4">
                <input v-model="newItemName" @keyup.enter="addShopItem" placeholder="輸入想買的商品..." class="flex-1 bg-white rounded-2xl px-4 py-3 text-sm outline-none shadow-sm">
                <button @click="addShopItem" class="bg-[#BDE0FE] text-blue-600 px-4 rounded-2xl font-bold">添加</button>
            </div>
            
            <div v-for="(item, index) in shoppingList" :key="index" class="glass-card p-4 flex items-center gap-3">
                <input type="checkbox" v-model="item.done" class="w-5 h-5 accent-pink-400">
                <input v-model="item.text" :class="['flex-1 bg-transparent outline-none font-bold text-gray-600', item.done ? 'checked-item' : '']">
                <button @click="shoppingList.splice(index, 1)" class="text-gray-300"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
        </div>

        <div v-if="activeTab === 'split'" class="pt-4">
            <div class="glass-card p-6 text-center">
                <p class="text-[10px] font-bold text-gray-400 mb-4 uppercase">Split the bill</p>
                <input type="number" v-model.number="bill.amount" class="w-full text-4xl font-bold text-center text-pink-400 bg-transparent outline-none mb-6" placeholder="0">
                <div class="flex items-center justify-between bg-blue-50/50 p-4 rounded-2xl mb-6">
                    <button @click="bill.people > 1 ? bill.people-- : null" class="w-10 h-10 bg-white rounded-full shadow-sm">-</button>
                    <span class="text-xl font-bold text-gray-600">{{ bill.people }} 人分擔</span>
                    <button @click="bill.people++" class="w-10 h-10 bg-white rounded-full shadow-sm">+</button>
                </div>
                <div class="bg-[#FFF9C4] rounded-3xl p-5 border-2 border-white">
                    <p class="text-xs text-yellow-700 font-bold">每人應付</p>
                    <p class="text-3xl font-bold text-yellow-600">${{ (bill.amount / bill.people).toFixed(0) }}</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-md border-t border-pink-100 flex justify-around items-center py-5 pb-8">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-pink-400' : 'text-gray-300'">
            <div class="flex flex-col items-center">
                <i data-lucide="calendar"></i>
                <span class="text-[10px] font-bold mt-1">行程表</span>
            </div>
        </button>
        <button @click="activeTab = 'shopping'" :class="activeTab === 'shopping' ? 'text-blue-400' : 'text-gray-300'">
            <div class="flex flex-col items-center">
                <i data-lucide="shopping-bag"></i>
                <span class="text-[10px] font-bold mt-1">購買清單</span>
            </div>
        </button>
        <button @click="activeTab = 'split'" :class="activeTab === 'split' ? 'text-yellow-500' : 'text-gray-300'">
            <div class="flex flex-col items-center">
                <i data-lucide="coins"></i>
                <span class="text-[10px] font-bold mt-1">分帳</span>
            </div>
        </button>
    </nav>

    <transition name="fade">
        <div v-if="showSettings" class="fixed inset-0 z-50 flex items-center justify-center p-6">
            <div @click="showSettings = false" class="absolute inset-0 bg-black/10 backdrop-blur-sm"></div>
            <div class="glass-card w-full max-w-sm p-8 relative animate-in zoom-in duration-300">
                <h3 class="text-xl font-bold text-gray-700 mb-6 flex items-center gap-2">旅程設定 <i data-lucide="moon" class="text-blue-300"></i></h3>
                <div class="space-y-4">
                    <div class="bg-pink-50/50 p-3 rounded-2xl">
                        <label class="text-[10px] font-bold text-pink-400 block mb-1">目的地</label>
                        <input v-model="settings.destination" class="w-full bg-transparent outline-none font-bold text-gray-600">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-blue-50/50 p-3 rounded-2xl">
                            <label class="text-[10px] font-bold text-blue-400 block mb-1">開始日期</label>
                            <input type="date" v-model="settings.startDate" class="w-full bg-transparent text-xs outline-none">
                        </div>
                        <div class="bg-blue-50/50 p-3 rounded-2xl">
                            <label class="text-[10px] font-bold text-blue-400 block mb-1">結束日期</label>
                            <input type="date" v-model="settings.endDate" class="w-full bg-transparent text-xs outline-none">
                        </div>
                    </div>
                    <div class="flex gap-3">
                        <div class="flex-1 bg-gray-50 p-3 rounded-2xl">
                            <label class="text-[10px] font-bold text-gray-400 block mb-1">去程航班</label>
                            <input v-model="settings.flightOut" class="w-full bg-transparent outline-none text-xs">
                        </div>
                        <div class="flex-1 bg-gray-50 p-3 rounded-2xl">
                            <label class="text-[10px] font-bold text-gray-400 block mb-1">回程航班</label>
                            <input v-model="settings.flightBack" class="w-full bg-transparent outline-none text-xs">
                        </div>
                    </div>
                </div>
                <button @click="showSettings = false" class="w-full mt-8 bg-gradient-to-r from-pink-300 to-blue-300 text-white font-bold py-4 rounded-3xl shadow-lg active:scale-95 transition">儲存並返回</button>
            </div>
        </div>
    </transition>

</div>

<script>
    const { createApp, ref, computed, watch, onMounted } = Vue;

    createApp({
        setup() {
            const activeTab = ref('itinerary');
            const activeDay = ref(1);
            const showSettings = ref(false);
            const newItemName = ref('');
            
            const settings = ref({
                destination: '首爾',
                startDate: '2026-06-01',
                endDate: '2026-06-05',
                flightOut: 'OZ712',
                flightBack: 'OZ711'
            });

            // 行程數據結構
            const itineraryData = ref({
                1: [{ time: '14:00', location: '抵達仁川', note: '記得先換錢' }]
            });

            // 購買清單
            const shoppingList = ref([
                { text: '化妝品', done: false },
                { text: '泡麵', done: true }
            ]);

            const bill = ref({ amount: 0, people: 2 });

            // 日期計算
            const totalDays = computed(() => {
                const start = new Date(settings.value.startDate);
                const end = new Date(settings.value.endDate);
                if (isNaN(start) || isNaN(end)) return 1;
                return Math.ceil((end - start) / (1000 * 60 * 60 * 24)) + 1;
            });

            const getDayDate = (dayOffset) => {
                const date = new Date(settings.value.startDate);
                date.setDate(date.getDate() + (dayOffset - 1));
                return date.toLocaleDateString('zh-TW', { month: 'short', day: 'numeric' });
            };

            const currentDayActivities = computed(() => {
                if (!itineraryData.value[activeDay.value]) {
                    itineraryData.value[activeDay.value] = [];
                }
                return itineraryData.value[activeDay.value];
            });

            const addActivity = () => {
                currentDayActivities.value.push({ time: '12:00', location: '', note: '' });
                refreshIcons();
            };

            const removeActivity = (index) => currentDayActivities.value.splice(index, 1);

            const addShopItem = () => {
                if (!newItemName.value) return;
                shoppingList.value.push({ text: newItemName.value, done: false });
                newItemName.value = '';
                refreshIcons();
            };

            const goMap = (loc) => {
                if (!loc) return alert('還沒輸入地點唷！');
                window.open(`https://www.google.com/maps/search/${encodeURIComponent(loc)}`, '_blank');
            };

            const refreshIcons = () => setTimeout(() => lucide.createIcons(), 0);

            onMounted(() => lucide.createIcons());
            watch([activeTab, activeDay, showSettings], refreshIcons);

            return {
                activeTab, activeDay, showSettings, settings, newItemName,
                totalDays, getDayDate, currentDayActivities, shoppingList, bill,
                addActivity, removeActivity, addShopItem, goMap
            };
        }
    }).mount('#app');
</script>

<style>
.fade-enter-active, .fade-leave-active { transition: opacity 0.3s; }
.fade-enter-from, .fade-leave-to { opacity: 0; }
</style>

</body>
</html>
