<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tokyo Trip Assistant Pro</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* 優化 Input 在手機上的外觀，隱藏部分預設圖示以符合 App 感 */
        input::-webkit-calendar-picker-indicator {
            background: transparent;
            bottom: 0; color: transparent; cursor: pointer; height: auto;
            left: 0; position: absolute; right: 0; top: 0; width: auto;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col pb-24">
        
        <header class="bg-white/80 backdrop-blur-md sticky top-0 z-20 px-6 py-4 border-b border-slate-100 flex justify-between items-center">
            <div>
                <h1 class="text-xl font-bold text-indigo-600">Tokyo 2026</h1>
                <p class="text-[10px] text-slate-400 font-medium">10.04 - 10.09 TRIP</p>
            </div>
            <div class="flex items-center space-x-2">
                <span class="text-xs bg-indigo-100 text-indigo-600 px-2 py-1 rounded-full font-medium">秋季攝影趣</span>
            </div>
        </header>

        <main class="flex-1 p-4 overflow-y-auto space-y-6">
            
            <section v-if="activeTab === 'itinerary'" class="space-y-4">
                
                <div class="bg-slate-900 text-white p-5 rounded-[2rem] shadow-xl relative overflow-hidden">
                    <div class="absolute right-[-10px] top-[-10px] opacity-10">
                        <i data-lucide="plane" class="w-32 h-32 rotate-45"></i>
                    </div>
                    <div class="relative z-10">
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-sm font-bold text-indigo-300 uppercase tracking-widest">航班資訊</h3>
                            <i data-lucide="plane-takeoff" class="w-4 h-4 text-indigo-300"></i>
                        </div>
                        <div class="grid grid-cols-1 gap-4">
                            <div class="relative bg-white/10 p-3 rounded-2xl border border-white/10">
                                <label class="text-[10px] text-indigo-200 block mb-1">去程航班時間 (點擊滾輪調整)</label>
                                <input type="datetime-local" v-model="flight.departure" class="bg-transparent text-white w-full focus:outline-none font-mono text-sm">
                            </div>
                            <div class="relative bg-white/10 p-3 rounded-2xl border border-white/10">
                                <label class="text-[10px] text-indigo-200 block mb-1">回程航班時間 (點擊滾輪調整)</label>
                                <input type="datetime-local" v-model="flight.return" class="bg-transparent text-white w-full focus:outline-none font-mono text-sm">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex justify-between items-center pt-2">
                    <h2 class="text-lg font-bold">每日行程預定</h2>
                    <button @click="addPlan" class="bg-indigo-600 text-white px-4 py-2 rounded-full shadow-lg flex items-center text-sm font-bold active:scale-95 transition">
                        <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增
                    </button>
                </div>
                
                <div v-for="(item, index) in itinerary" :key="item.id" class="relative pl-8 border-l-2 border-indigo-100 pb-6 last:pb-0">
                    <div class="absolute -left-[9px] top-0 w-4 h-4 rounded-full bg-indigo-500 border-4 border-white shadow-sm"></div>
                    <div class="bg-white p-4 rounded-2xl shadow-sm border border-slate-100 group">
                        <div class="flex justify-between items-start mb-2">
                            <div class="relative">
                                <input v-model="item.time" type="time" class="text-base font-black text-indigo-600 focus:outline-none bg-indigo-50 rounded-lg px-2 py-1">
                            </div>
                            <button @click="removePlan(index)" class="text-slate-300 hover:text-red-400 p-1">
                                <i data-lucide="x" class="w-4 h-4"></i>
                            </button>
                        </div>
                        <input v-model="item.location" placeholder="輸入地點或標題..." class="block w-full text-base font-bold focus:outline-none border-b border-transparent focus:border-indigo-100 mb-2">
                        <div class="flex items-center text-[11px] text-slate-400 bg-slate-50 w-fit px-2 py-1 rounded-md cursor-pointer active:bg-slate-100" @click="openNav(item.location)">
                            <i data-lucide="map-pin" class="w-3 h-3 mr-1 text-indigo-400"></i>
                            <span>開啟 Google Maps 導航</span>
                        </div>
                    </div>
                </div>
            </section>

            <section v-if="activeTab === 'split'" class="space-y-6">
                <div class="bg-gradient-to-br from-indigo-600 to-violet-600 p-6 rounded-[2.5rem] text-white shadow-xl">
                    <p class="opacity-80 text-xs font-bold uppercase tracking-wider mb-1">平均每人負擔</p>
                    <h2 class="text-3xl font-black">¥ {{ perPersonCost.toLocaleString() }}</h2>
                </div>
                <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
                    <h3 class="font-bold mb-4 flex items-center"><i data-lucide="calculator" class="w-4 h-4 mr-2 text-indigo-500"></i>新增公費支出</h3>
                    <div class="space-y-4">
                        <input v-model.number="newExpense.amount" type="number" placeholder="金額 (JPY)" class="w-full p-4 bg-slate-50 rounded-2xl focus:outline-none ring-1 ring-slate-100 focus:ring-2 focus:ring-indigo-500/20 transition-all">
                        <select v-model="newExpense.paidBy" class="w-full p-4 bg-slate-50 rounded-2xl focus:outline-none ring-1 ring-slate-100">
                            <option value="A">成員 A 付款</option>
                            <option value="B">成員 B 付款</option>
                        </select>
                        <button @click="addExpense" class="w-full bg-slate-900 text-white p-4 rounded-2xl font-bold active:scale-95 transition shadow-lg">記上一筆</button>
                    </div>
                </div>
                <div class="text-center p-4 bg-indigo-50 rounded-2xl border border-indigo-100">
                    <p class="text-sm text-indigo-700 font-bold">{{ settlementMessage }}</p>
                </div>
            </section>

            <section v-if="activeTab === 'map'" class="space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <button v-for="place in commonPlaces" @click="openNav(place.name)" class="p-4 bg-white rounded-3xl border border-slate-100 shadow-sm text-left active:scale-95 transition">
                        <i :data-lucide="place.icon" class="w-6 h-6 text-indigo-500 mb-2"></i>
                        <p class="font-bold text-xs">{{place.name}}</p>
                    </button>
                </div>
            </section>

        </main>

        <nav class="fixed bottom-0 left-0 right-0 bg-white/90 backdrop-blur-xl border-t border-slate-100 px-8 py-4 flex justify-between items-center shadow-[0_-10px_30px_rgba(0,0,0,0.03)] max-w-md mx-auto z-30 rounded-t-[2rem]">
            <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-indigo-600' : 'text-slate-300'" class="flex flex-col items-center space-y-1">
                <i data-lucide="calendar-days" :class="activeTab === 'itinerary' ? 'fill-indigo-50' : ''" class="w-6 h-6 transition-all"></i>
                <span class="text-[10px] font-black uppercase">行程</span>
            </button>
            <button @click="activeTab = 'split'" :class="activeTab === 'split' ? 'text-indigo-600' : 'text-slate-300'" class="flex flex-col items-center space-y-1">
                <i data-lucide="banknote" :class="activeTab === 'split' ? 'fill-indigo-50' : ''" class="w-6 h-6 transition-all"></i>
                <span class="text-[10px] font-black uppercase">分帳</span>
            </button>
            <button @click="activeTab = 'map'" :class="activeTab === 'map' ? 'text-indigo-600' : 'text-slate-300'" class="flex flex-col items-center space-y-1">
                <i data-lucide="map-pinned" :class="activeTab === 'map' ? 'fill-indigo-50' : ''" class="w-6 h-6 transition-all"></i>
                <span class="text-[10px] font-black uppercase">地圖</span>
            </button>
        </nav>
    </div>

    <script>
        const { createApp, ref, computed, onMounted, nextTick, watch } = Vue;

        createApp({
            setup() {
                const activeTab = ref('itinerary');
                
                // 航班資訊：預設為你的旅遊日期 2026/10/04
                const flight = ref({
                    departure: '2026-10-04T08:30',
                    return: '2026-10-09T18:00'
                });

                // 每日行程：預設為你偏好的 10 點後開始
                const itinerary = ref([
                    { id: 1, time: '10:30', location: '抵達 VIA INN 品川大井町寄放行李' },
                    { id: 2, time: '13:00', location: '秋葉原模型巡禮' },
                    { id: 3, time: '19:00', location: 'Roast Beef Ohno 晚餐' }
                ]);

                const expenses = ref([]);
                const newExpense = ref({ amount: null, paidBy: 'A' });

                const commonPlaces = [
                    { name: 'VIA INN 品川大井町', icon: 'hotel' },
                    { name: '東京迪士尼', icon: 'castle' },
                    { name: '淺草寺', icon: 'shrine' },
                    { name: '秋葉原', icon: 'shopping-bag' }
                ];

                const addPlan = () => {
                    itinerary.value.push({ id: Date.now(), time: '10:00', location: '' });
                    nextTick(() => lucide.createIcons());
                };

                const removePlan = (index) => itinerary.value.splice(index, 1);

                const addExpense = () => {
                    if (newExpense.value.amount > 0) {
                        expenses.value.push({ ...newExpense.value });
                        newExpense.value.amount = null;
                    }
                };

                const perPersonCost = computed(() => {
                    const total = expenses.value.reduce((sum, ex) => sum + ex.amount, 0);
                    return total === 0 ? 0 : Math.round(total / 2);
                });

                const settlementMessage = computed(() => {
                    let aPaid = expenses.value.filter(e => e.paidBy === 'A').reduce((s, e) => s + e.amount, 0);
                    let bPaid = expenses.value.filter(e => e.paidBy === 'B').reduce((s, e) => s + e.amount, 0);
                    let diff = Math.round((aPaid - bPaid) / 2);
                    if (diff > 0) return `成員 B 應給 A：¥ ${Math.abs(diff)}`;
                    if (diff < 0) return `成員 A 應給 B：¥ ${Math.abs(diff)}`;
                    return "目前帳目平分！";
                });

                const openNav = (location) => {
                    if (!location) return;
                    window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(location)}`, '_blank');
                };

                onMounted(() => lucide.createIcons());
                watch(activeTab, () => nextTick(() => lucide.createIcons()));

                return {
                    activeTab, flight, itinerary, expenses, newExpense, commonPlaces,
                    addPlan, removePlan, addExpense, perPersonCost, settlementMessage, openNav
                };
            }
        }).mount('#app');
    </script>
</body>
</html>
