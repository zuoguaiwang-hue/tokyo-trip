<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小森旅程 - 團體旅遊規劃</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'forest-green': '#6DA67A',
                        'wood-brown': '#A67B5B',
                        'soft-beige': '#F7F4EB',
                        'paper-white': '#FFFFFF',
                        'clay-gray': '#E0E5D5',
                    },
                    borderRadius: {
                        'ac-lg': '2.5rem',
                        'ac-md': '1.5rem',
                        'ac-sm': '1rem',
                    },
                    boxShadow: {
                        'ac-soft': '4px 4px 0px #E0E5D5',
                        'ac-inner': 'inset 2px 2px 4px rgba(0,0,0,0.05)',
                    }
                }
            }
        }
    </script>

    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #F7F4EB;
            /* 手帳格紋背景 */
            background-image: radial-gradient(#E0E5D5 0.8px, transparent 0.8px);
            background-size: 24px 24px;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* 登機證缺口效果 */
        .ticket-cut {
            position: relative;
        }
        .ticket-cut::before, .ticket-cut::after {
            content: '';
            position: absolute;
            bottom: 40px;
            width: 20px;
            height: 20px;
            background: #F7F4EB;
            border-radius: 50%;
        }
        .ticket-cut::before { left: -12px; border: 2px solid #E0E5D5; }
        .ticket-cut::after { right: -12px; border: 2px solid #E0E5D5; }
    </style>
</head>
<body class="text-stone-700">

    <div id="root"></div>

    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const App = () => {
            const [activeTab, setActiveTab] = useState('schedule');

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32">
                    {/* Header */}
                    <header className="p-6 pb-2">
                        <div className="flex justify-between items-end mb-4">
                            <div>
                                <h1 className="text-2xl font-black text-wood-brown tracking-tight">東京秋日祭 ✨</h1>
                                <p className="text-stone-400 font-bold">2026.10.04 - 10.09</p>
                            </div>
                            <div className="bg-forest-green text-white px-4 py-2 rounded-ac-sm shadow-ac-soft text-sm font-bold active:scale-95 transition-transform">
                                倒數 15 天
                            </div>
                        </div>
                    </header>

                    {/* Main Content Area */}
                    <main className="px-4">
                        {activeTab === 'schedule' && <ScheduleView />}
                        {activeTab === 'bookings' && <BookingView />}
                        {activeTab === 'expense' && <ExpenseView />}
                        {activeTab === 'planning' && <PlanningView />}
                    </main>

                    {/* Bottom Navigation */}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-[380px] bg-white border-2 border-clay-gray rounded-ac-lg shadow-ac-soft flex justify-around p-3 z-50">
                        <NavBtn icon="fa-calendar-days" label="行程" active={activeTab === 'schedule'} onClick={() => setActiveTab('schedule')} />
                        <NavBtn icon="fa-ticket" label="預訂" active={activeTab === 'bookings'} onClick={() => setActiveTab('bookings')} />
                        <NavBtn icon="fa-wallet" label="記帳" active={activeTab === 'expense'} onClick={() => setActiveTab('expense')} />
                        <NavBtn icon="fa-clipboard-list" label="準備" active={activeTab === 'planning'} onClick={() => setActiveTab('planning')} />
                    </nav>
                </div>
            );
        };

        const NavBtn = ({ icon, label, active, onClick }) => (
            <button onClick={onClick} className={`flex flex-col items-center gap-1 transition-all ${active ? 'text-forest-green scale-110' : 'text-stone-300 hover:text-stone-400'}`}>
                <i className={`fa-solid ${icon} text-xl`}></i>
                <span className="text-[10px] font-black uppercase tracking-tighter">{label}</span>
                {active && <div className="w-1.5 h-1.5 bg-forest-green rounded-full"></div>}
            </button>
        );

        const ScheduleView = () => (
            <div className="space-y-6 animate-fadeIn">
                {/* 日期選擇器 */}
                <div className="flex gap-3 overflow-x-auto no-scrollbar py-2">
                    {['10/4', '10/5', '10/6', '10/7', '10/8', '10/9'].map((d, i) => (
                        <div key={i} className={`flex-shrink-0 w-16 h-20 rounded-ac-md border-2 flex flex-col items-center justify-center transition-all ${i === 0 ? 'bg-wood-brown text-white border-wood-brown shadow-ac-soft' : 'bg-white border-clay-gray text-stone-400'}`}>
                            <span className="text-xs opacity-80 font-bold uppercase">Day {i+1}</span>
                            <span className="text-lg font-black">{d}</span>
                        </div>
                    ))}
                </div>

                {/* 天氣卡片 */}
                <div className="bg-sky-100 p-4 rounded-ac-md border-2 border-sky-200 flex items-center justify-between">
                    <div className="flex items-center gap-3">
                        <span className="text-3xl">☀️</span>
                        <div>
                            <p className="font-bold text-sky-800">今日天氣：晴朗</p>
                            <p className="text-xs text-sky-600 font-medium">適合漫步在淺草街頭，氣溫 22°C</p>
                        </div>
                    </div>
                </div>

                {/* 時間軸 */}
                <div className="relative border-l-2 border-clay-gray ml-3 pl-8 space-y-6">
                    <TimelineItem time="12:30" title="淺草今半 壽喜燒" type="美食" color="bg-orange-400" icon="fa-utensils" />
                    <TimelineItem time="15:00" title="雷門 & 仲見世通商店街" type="景點" color="bg-forest-green" icon="fa-camera" />
                    <TimelineItem time="18:00" title="SHIBUYA SKY 展望台" type="景點" color="bg-forest-green" icon="fa-city" />
                </div>
            </div>
        );

        const TimelineItem = ({ time, title, type, color, icon }) => (
            <div className="relative group">
                <div className={`absolute -left-[41px] top-1 w-6 h-6 rounded-full border-4 border-soft-beige flex items-center justify-center text-[10px] text-white ${color}`}>
                    <i className={`fa-solid ${icon}`}></i>
                </div>
                <div className="bg-white p-4 rounded-ac-md border-2 border-clay-gray shadow-ac-soft active:scale-[0.98] transition-all cursor-pointer">
                    <div className="flex justify-between items-start">
                        <span className="text-xs font-black text-stone-400">{time}</span>
                        <span className={`text-[10px] px-2 py-0.5 rounded-full text-white font-bold ${color}`}>{type}</span>
                    </div>
                    <h3 className="font-black text-lg mt-1 text-stone-700">{title}</h3>
                </div>
            </div>
        );

        const BookingView = () => (
            <div className="space-y-6">
                <h2 className="font-black text-xl text-wood-brown flex items-center gap-2">
                    <i className="fa-solid fa-plane-departure"></i> 交通與住宿憑證
                </h2>
                {/* 登機證卡片 */}
                <div className="bg-white border-2 border-clay-gray rounded-ac-md shadow-ac-soft overflow-hidden ticket-cut transition-transform active:rotate-1">
                    <div className="bg-forest-green p-4 text-white flex justify-between items-center">
                        <span className="font-black">BOARDING PASS</span>
                        <i className="fa-solid fa-plane"></i>
                    </div>
                    <div className="p-6">
                        <div className="flex justify-between items-center mb-4">
                            <div>
                                <p className="text-xs text-stone-400 font-bold italic">FROM</p>
                                <p className="text-2xl font-black">TPE</p>
                            </div>
                            <div className="text-stone-300 flex flex-col items-center">
                                <span className="text-[10px] font-bold">BR198</span>
                                <div className="w-16 h-px bg-stone-200 relative my-1">
                                    <div className="absolute right-0 -top-1 font-black">✈️</div>
                                </div>
                            </div>
                            <div className="text-right">
                                <p className="text-xs text-stone-400 font-bold italic">TO</p>
                                <p className="text-2xl font-black">HND</p>
                            </div>
                        </div>
                        <div className="grid grid-cols-2 gap-4 border-t-2 border-dashed border-clay-gray pt-4">
                            <div>
                                <p className="text-[10px] text-stone-400 font-bold">GATE</p>
                                <p className="font-black">B7</p>
                            </div>
                            <div>
                                <p className="text-[10px] text-stone-400 font-bold">TIME</p>
                                <p className="font-black">04:30 AM</p>
                            </div>
                        </div>
                    </div>
                </div>

                {/* 飯店卡片 */}
                <div className="bg-white p-4 rounded-ac-md border-2 border-clay-gray shadow-ac-soft flex gap-4">
                    <div className="w-20 h-20 bg-stone-100 rounded-ac-sm overflow-hidden flex-shrink-0">
                        <img src="https://images.unsplash.com/photo-1542314831-068cd1dbfeeb?w=150&h=150&fit=crop" alt="hotel" className="w-full h-full object-cover" />
                    </div>
                    <div className="flex-1">
                        <h3 className="font-black text-stone-700">VIA INN 東京大井町</h3>
                        <p className="text-xs text-stone-400 mt-1">📍 品川區大井 1-50-5</p>
                        <div className="mt-2 flex gap-2">
                            <span className="text-[10px] bg-wood-brown/10 text-wood-brown px-2 py-0.5 rounded font-bold italic">Check-in 15:00</span>
                        </div>
                    </div>
                </div>
            </div>
        );

        const ExpenseView = () => (
            <div className="space-y-6">
                {/* 儀表板 */}
                <div className="bg-wood-brown p-6 rounded-ac-lg shadow-ac-soft text-white text-center">
                    <p className="text-xs font-bold opacity-80 uppercase tracking-widest mb-1">Total Expenses</p>
                    <h2 className="text-4xl font-black">¥ 45,800</h2>
                    <p className="text-sm mt-2 opacity-90 font-medium">約 NT$ 9,618</p>
                </div>

                <div className="flex justify-between items-center px-2">
                    <h3 className="font-black text-lg">明細</h3>
                    <button className="w-10 h-10 bg-forest-green text-white rounded-full shadow-ac-soft active:scale-90 transition-transform">
                        <i className="fa-solid fa-plus"></i>
                    </button>
                </div>

                <div className="space-y-3">
                    {['晚餐 - 壽喜燒', 'Suica 加值', '澀谷展望台門票'].map((item, i) => (
                        <div key={i} className="bg-white p-4 rounded-ac-md border-2 border-clay-gray shadow-ac-soft flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="w-10 h-10 rounded-full bg-soft-beige flex items-center justify-center text-wood-brown">
                                    <i className="fa-solid fa-bowl-food"></i>
                                </div>
                                <div>
                                    <p className="font-black text-stone-700">{item}</p>
                                    <p className="text-[10px] text-stone-400 font-bold italic">Pay by You • Split all</p>
                                </div>
                            </div>
                            <p className="font-black text-lg">¥ 4,500</p>
                        </div>
                    ))}
                </div>
            </div>
        );

        const PlanningView = () => (
            <div className="space-y-6">
                <div className="flex gap-2 p-1 bg-clay-gray/30 rounded-ac-md">
                    <button className="flex-1 py-2 bg-white rounded-ac-sm shadow-sm font-black text-sm">待辦清單</button>
                    <button className="flex-1 py-2 text-stone-400 font-black text-sm">行李清單</button>
                </div>

                <div className="space-y-3">
                    {[
                        { text: "預約機場接送", done: true },
                        { text: "換匯 5 萬日圓", done: false },
                        { text: "購買迪士尼門票", done: false },
                        { text: "查詢 VJW 入境 QR Code", done: false }
                    ].map((todo, i) => (
                        <div key={i} className={`flex items-center gap-4 p-4 rounded-ac-md border-2 transition-all ${todo.done ? 'bg-stone-50 border-stone-200' : 'bg-white border-clay-gray shadow-ac-soft'}`}>
                            <div className={`w-6 h-6 rounded-ac-sm border-2 flex items-center justify-center transition-all ${todo.done ? 'bg-forest-green border-forest-green text-white' : 'border-clay-gray'}`}>
                                {todo.done && <i className="fa-solid fa-check text-xs"></i>}
                            </div>
                            <span className={`font-bold flex-1 ${todo.done ? 'text-stone-300 line-through' : 'text-stone-700'}`}>{todo.text}</span>
                            <div className="w-8 h-8 rounded-full bg-soft-beige border border-clay-gray overflow-hidden">
                                <img src={`https://i.pravatar.cc/100?img=${i+10}`} alt="member" className="w-full h-full object-cover" />
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
