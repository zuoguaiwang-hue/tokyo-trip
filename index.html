<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiki & Lala 夢幻旅行助手 v3</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --lala-pink: #FFC8DD;
            --kiki-blue: #BDE0FE;
            --star-yellow: #FFF9C4;
        }
        body {
            font-family: 'Quicksand', 'Itim', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #e0f2fe 100%);
            overscroll-behavior: none;
        }
        .app-shell {
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 30px;
            border: 2px solid #ffffff;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.1);
        }
        /* 隱藏滾動條但保留功能 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .day-tab {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .day-tab.active {
            background: var(--lala-pink);
            color: white;
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(255, 200, 221, 0.5);
        }
        .modal-enter-active, .modal-leave-active { transition: all 0.4s ease; }
        .modal-enter-from, .modal-leave-to { opacity: 0; transform: translateY(20px); }
    </style>
</head>
<body class="flex justify-center items-center">

<div id="app" class="app-shell w-full relative flex flex-col overflow-hidden shadow-2xl">
    
    <header class="pt-10 pb-4 px-8 flex justify-between items-end">
        <div>
            <p class="text-[10px] text-pink-400 font-bold tracking-[0.2em] mb-1">MY DREAM TRIP</p>
            <h1 class="text-2xl font-bold text-gray-700">
                {{ settings.destination }} <span class="text-yellow-400">★</span>
            </h1>
        </div>
        <button @click="showSettings = true" class="w-10 h-10 rounded-2xl bg-white shadow-sm flex justify-center items-center text-blue-300 hover:rotate-12 transition">
            <i data-lucide="settings"></i>
        </button>
    </header>

    <div class="px-6 py-2">
        <div class="flex gap-3 overflow-x-auto no-scrollbar py-2">
            <button 
                v-for="day in totalDays" 
                :key="day"
                @click="activeDay = day"
                :class="['day-tab px-5 py-2 rounded-2xl text-xs font-bold whitespace-nowrap border-2 border-white', 
                        activeDay === day ? 'active' : 'bg-white/50 text-gray-400']"
            >
                Day {{ day }}
            </button>
        </div>
    </div>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <div v-if="activeTab === 'itinerary'" class="space-y-4 animate-in fade-in duration-500">
            <div class="flex justify-between items-center mt-2">
                <h2 class="text-sm font-bold text-gray-500 flex items-center gap-2">
                    <i data-lucide="sparkles" class="w-4 h-4 text-yellow-300"></i>
                    第 {{ activeDay }} 天行程
                </h2>
                <button @click="addActivity" class="text-xs font-bold text-blue-500 bg-blue-50 px-3 py-1 rounded-full">
                    + 新增計畫
                </button>
            </div>

            <div v-if="currentDayActivities.length === 0" class="py-12 text-center text-gray-300 italic text-sm">
                這一天還沒有安排行程唷...
            </div>

            <div v-for="(act, index) in currentDayActivities" :key="index" class="glass-card p-4 space-y-3">
                <div class="flex items-center gap-3">
                    <input type="time" v-model="act.time" class="bg-pink-50 border-none text-xs font-bold text-pink-400 p-2 outline-none rounded-xl">
                    <input v-model="act.location" placeholder="要去哪裡玩？" class="flex-1 bg-transparent border-b border-dashed border-gray-100 font-bold text-gray-700 outline-none focus:border-pink-300">
                </div>
                <div class="flex justify-between items-center">
                    <button @click="goMap(act.location)" class="text-[10px] text-blue-400 flex items-center gap-1 bg-blue-50 px-3 py-1 rounded-full">
                        <i data-lucide="map" class="w-3 h-3"></i> 導航
                    </button>
                    <button @click="removeActivity(index)" class="text-gray-300 hover:text-red-300">
                        <i data-lucide="x" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <div v-if="activeTab === 'split'" class="space-y-6 pt-4">
            <div class="glass-card p-6 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-4">Expense Calculator</p>
                <div class="relative inline-block w-full">
                    <span class="absolute left-4 top-1/2 -translate-y-1/2 text-pink-300 font-bold">$</span>
                    <input type="number" v-model.number="bill.amount" class="w-full text-4xl font-bold text-center text-pink-400 bg-pink-50/50 rounded-3xl p-4 outline-none">
                </div>
                
                <div class="flex items-center justify-around my-8">
                    <button @click="bill.people > 1 ? bill.people-- : null" class="w-12 h-12 rounded-full bg-white shadow-sm text-blue-400 text-xl font-bold">-</button>
                    <div class="text-center">
                        <span class="text-3xl font-bold text-gray-600">{{ bill.people }}</span>
                        <p class="text-[10px] text-gray-400 font-bold">TRAVELERS</p>
                    </div>
                    <button @click="bill.people++" class="w-12 h-12 rounded-full bg-white shadow-sm text-blue-400 text-xl font-bold">+</button>
                </div>

                <div class="bg-[#FFF9C4] rounded-[2rem] p-6 shadow-sm border-2 border-white">
                    <p class="text-xs text-yellow-700 font-bold mb-1">每人應付</p>
                    <p class="text-4xl font-bold text-yellow-600">${{ (bill.amount / bill.people).toFixed(0) }}</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="absolute bottom-0 w-full bg-white/90 backdrop-blur-xl border-t border-pink-100 flex justify-around items-center py-5 pb-8">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'text-pink-400 scale-110' : 'text-gray-300'" class="transition-all">
            <div class="flex flex-col items-center">
                <i data-lucide="map-pinned"></i>
                <span class="text-[10px] font-bold mt-1">行程表</span>
            </div>
        </button>
        <button @click="activeTab = 'split'" :class="activeTab === 'split' ? 'text-blue-400 scale-110' : 'text-gray-300'" class="transition-all">
            <div class="flex flex-col items-center">
                <i data-lucide="wallet"></i>
                <span class="text-[10px] font-bold mt-1">分帳</span>
            </div>
        </button>
    </nav>

    <transition name="modal">
        <div v-if="showSettings" class="fixed inset-0 z-50 flex items-end justify-center">
            <div @click="showSettings = false" class="absolute inset-0 bg-black/20 backdrop-blur-sm"></div>
            <div class="glass-card w-full p-8 pb-12 rounded-t-[3rem] rounded-b-none relative animate-in slide-in-from-bottom duration-500">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-6"></div>
                
                <h3 class="text-xl font-bold text-gray-700 mb-6 flex items-center gap-2">
                    旅程設定 <span class="text-pink-300">☁️</span>
                </h3>

                <div class="space-y-4">
                    <div class="bg-white/50 p-4 rounded-2xl border border-white">
                        <label class="text-[10px] font-bold text-pink-400 block mb-1">目的地</label>
                        <input v-model="settings.destination" class="w-full bg-transparent outline-none font-bold text-gray-600">
                    </div>
                    
                    <div class="grid grid-cols-2 gap-3 bg-white/50 p-4 rounded-2xl border border-white">
                        <div>
                            <label class="text-[10px] font-bold text-blue-400 block mb-1">開始日期</label>
                            <input type="date" v-model="settings.startDate" class="w-full bg-transparent text-xs outline-none font-bold">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-blue-400 block mb-1">結束日期</label>
                            <input type="date" v-model="settings.endDate" class="w-full bg-transparent text-xs outline-none font-bold">
                        </div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="bg-pink-50/50 p-3 rounded-2xl">
                            <label class="text-[10px] font-bold text-pink-300 block mb-1">去程航班</label>
                            <input v-model="settings.flightOut" class="w-full bg-transparent outline-none text-xs text-gray-500">
                        </div>
                        <div class="bg-pink-50/50 p-3 rounded-2xl">
                            <label class="text-[10px] font-bold text-pink-300 block mb-1">回程航班</label>
                            <input v-model="settings.flightBack" class="w-full bg-transparent outline-none text-xs text-gray-500">
                        </div>
                    </div>
                </div>

                <div class="mt-6 p-4 bg-blue-50/50 rounded-2xl text-center">
                    <p class="text-xs text-blue-400 font-bold">總共行程天數：{{ totalDays }} 天</p>
                </div>

                <button @click="showSettings = false" class="w-full mt-6 bg-gradient-to-r from-pink-300 to-blue-300 text-white font-bold py-4 rounded-3xl shadow-lg active:scale-95 transition">
                    準備好出發了！
                </button>
            </div>
        </div>
    </transition>

</div>

<script>
    const { createApp, ref, computed, watch, onMounted } = Vue;

    createApp({
        setup() {
            const activeTab = ref('itinerary');
            const activeDay = ref(1);
            const showSettings = ref(false);
            
            const settings = ref({
                destination: '大阪',
                startDate: '2026-07-01',
                endDate: '2026-07-06',
                flightOut: 'JX822 09:30',
                flightBack: 'JX823 15:45'
            });

            // 行程數據結構：{ 1: [], 2: [], ... }
            const itineraryData = ref({
                1: [{ time: '12:00', location: '關西機場' }, { time: '15:00', location: '心齋橋' }],
                2: [{ time: '09:00', location: '環球影城' }]
            });

            const bill = ref({ amount: 0, people: 2 });

            // 計算總天數
            const totalDays = computed(() => {
                const start = new Date(settings.value.startDate);
                const end = new Date(settings.value.endDate);
                if (isNaN(start) || isNaN(end)) return 1;
                const diffTime = end - start;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24)) + 1;
                return diffDays > 0 ? diffDays : 1;
            });

            // 取得目前選中天數的行程
            const currentDayActivities = computed(() => {
                if (!itineraryData.value[activeDay.value]) {
                    itineraryData.value[activeDay.value] = [];
                }
                return itineraryData.value[activeDay.value];
            });

            // 監聽日期變化，若天數縮減，切換 activeDay 避免溢出
            watch(totalDays, (newVal) => {
                if (activeDay.value > newVal) activeDay.value = newVal;
            });

            const addActivity = () => {
                currentDayActivities.value.push({ time: '12:00', location: '' });
                setTimeout(() => lucide.createIcons(), 0);
            };

            const removeActivity = (index) => {
                currentDayActivities.value.splice(index, 1);
            };

            const goMap = (loc) => {
                if (!loc) alert('親愛的，地點是空白的唷！');
                else window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
            };

            onMounted(() => lucide.createIcons());
            watch([activeTab, activeDay, showSettings], () => {
                setTimeout(() => lucide.createIcons(), 0);
            }, { flush: 'post' });

            return {
                activeTab, activeDay, showSettings, settings, 
                totalDays, currentDayActivities, bill,
                addActivity, removeActivity, goMap
            };
        }
    }).mount('#app');
</script>

</body>
</html>
