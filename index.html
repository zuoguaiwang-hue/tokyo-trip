<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>夢幻星系 · 旅遊規劃 App</title>
    <link href="https://fonts.googleapis.com/css2?family=Varela+Round&family=Noto+Sans+TC:wght@500;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        lavender: '#E6E6FA',
                        lalaPink: '#FFB6C1',
                        kikiBlue: '#87CEEB',
                        starGold: '#FFFACD',
                        ink: '#4A3728',
                    },
                    fontFamily: {
                        cute: ['"Varela Round"', '"Noto Sans TC"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Varela Round', 'Noto Sans TC', sans-serif; background-color: #E6E6FA; color: #4A3728; }
        /* 硬陰影貼紙效果 */
        .sticker-card {
            border: 2px solid #4A3728;
            box-shadow: 4px 4px 0px 0px #4A3728;
            transition: all 0.1s;
        }
        .sticker-card:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px 0px #4A3728;
        }
        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body x-data="{ 
    tab: 'home', 
    jpy: '', 
    rate: 0.21,
    showCalc: false,
    items: [
        { name: '護照', checked: true },
        { name: '行動電源', checked: false },
        { name: '日幣現金', checked: false }
    ]
}">

    <div class="max-w-md mx-auto min-h-screen relative pb-32">
        
        <header class="p-6 flex justify-between items-center">
            <h1 class="text-3xl font-black italic tracking-tighter" @click="tab = 'home'">Travel Stars.</h1>
            <div class="flex gap-2">
                <div class="w-3 h-3 rounded-full bg-lalaPink border border-ink"></div>
                <div class="w-3 h-3 rounded-full bg-kikiBlue border border-ink"></div>
            </div>
        </header>

        <main x-show="tab === 'home'" class="p-4 grid grid-cols-2 gap-4">
            <div @click="tab = 'timeline'" class="sticker-card col-span-2 bg-lalaPink p-6 rounded-2xl cursor-pointer relative overflow-hidden">
                <div class="absolute -top-4 -right-4 w-16 h-16 bg-white/30 rounded-full blur-xl"></div>
                <h2 class="text-2xl font-black">✨ 東京夢幻冒險</h2>
                <p class="font-bold mt-1 opacity-80">10/04 - 10/10 · 準備出發！</p>
                <div class="mt-4 flex gap-2">
                    <span class="bg-white/50 px-3 py-1 rounded-full text-xs font-bold border border-ink">SHIBUYA</span>
                    <span class="bg-white/50 px-3 py-1 rounded-full text-xs font-bold border border-ink">迪士尼</span>
                </div>
            </div>

            <div @click="tab = 'calc'" class="sticker-card bg-kikiBlue p-4 rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer">
                <i data-lucide="wallet"></i>
                <span class="font-bold">夢幻記帳</span>
            </div>

            <div @click="tab = 'list'" class="sticker-card bg-starGold p-4 rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer">
                <i data-lucide="check-square"></i>
                <span class="font-bold">行李檢查</span>
            </div>

            <div @click="tab = 'list'" class="sticker-card bg-lalaPink p-4 rounded-2xl flex flex-col items-center justify-center gap-2 cursor-pointer">
                <i data-lucide="gift"></i>
                <span class="font-bold">伴手禮物</span>
            </div>

            <div class="sticker-card bg-white p-2 rounded-2xl relative overflow-hidden aspect-square">
                <div class="absolute top-1 left-2 z-10 text-[10px] bg-kikiBlue border border-ink px-1 rounded font-bold">MY BUDDY</div>
                <img src="https://images.unsplash.com/photo-1552728089-57bdde30eba3?auto=format&fit=crop&w=300&q=80" class="w-full h-full object-cover rounded-xl" alt="Pet">
            </div>
        </main>

        <main x-show="tab === 'timeline'" class="p-4" x-transition>
            <div class="flex items-center gap-2 mb-6" @click="tab = 'home'">
                <i data-lucide="chevron-left"></i>
                <span class="font-bold text-lg">返回計畫</span>
            </div>

            <div class="flex gap-3 overflow-x-auto pb-4 no-scrollbar">
                <template x-for="d in ['04','05','06','07','08','09','10']">
                    <div class="flex-shrink-0 w-16 h-16 sticker-card bg-white flex flex-col items-center justify-center rounded-2xl" :class="d === '04' ? 'bg-lalaPink' : ''">
                        <span class="text-[10px] font-bold">OCT</span>
                        <span class="text-xl font-black" x-text="d"></span>
                    </div>
                </template>
            </div>

            <div class="mt-8 border-l-4 border-ink ml-4 pl-8 space-y-8 relative">
                <div class="relative">
                    <div class="absolute -left-[42px] top-0 w-6 h-6 rounded-full bg-kikiBlue border-2 border-ink"></div>
                    <div class="sticker-card bg-white p-4 rounded-xl">
                        <span class="text-xs font-bold text-gray-400">09:00 AM</span>
                        <p class="font-black">📍 成田機場抵達</p>
                    </div>
                </div>
                <div class="relative">
                    <div class="absolute -left-[42px] top-0 w-6 h-6 rounded-full bg-starGold border-2 border-ink"></div>
                    <div class="sticker-card bg-white p-4 rounded-xl">
                        <span class="text-xs font-bold text-gray-400">14:00 PM</span>
                        <p class="font-black">🏨 淺草飯店 Check-in</p>
                    </div>
                </div>
            </div>
        </main>

        <main x-show="tab === 'calc'" class="p-4" x-transition>
            <div @click="tab = 'home'" class="flex items-center gap-2 mb-4 cursor-pointer font-bold"><i data-lucide="chevron-left"></i> 返回</div>
            <div class="sticker-card bg-white p-6 rounded-3xl space-y-6">
                <div class="flex items-center gap-4">
                    <div class="flex-1">
                        <label class="block text-xs font-black mb-1">日幣 JPY</label>
                        <input type="number" x-model="jpy" placeholder="0" class="w-full text-2xl font-black p-3 border-2 border-ink rounded-xl focus:outline-none">
                    </div>
                    <div class="pt-5 font-black text-2xl">➔</div>
                    <div class="flex-1">
                        <label class="block text-xs font-black mb-1">台幣 TWD</label>
                        <div class="w-full text-2xl font-black p-3 border-2 border-ink rounded-xl bg-kikiBlue/20 min-h-[60px]" x-text="Math.round(jpy * rate)">0</div>
                    </div>
                </div>
                <div class="grid grid-cols-3 gap-3">
                    <template x-for="n in [1,2,3,4,5,6,7,8,9,'.',0]">
                        <button @click="jpy = jpy.toString() + n.toString()" class="sticker-card bg-white py-4 text-xl font-black rounded-xl" x-text="n"></button>
                    </template>
                    <button @click="jpy = ''" class="sticker-card bg-lalaPink py-4 text-xl font-black rounded-xl">C</button>
                </div>
                <button class="w-full sticker-card bg-starGold py-4 rounded-full font-black text-lg">儲存這筆開支 ✨</button>
            </div>
        </main>

        <main x-show="tab === 'list'" class="p-4" x-transition>
            <div @click="tab = 'home'" class="flex items-center gap-2 mb-4 cursor-pointer font-bold"><i data-lucide="chevron-left"></i> 返回</div>
            <div class="space-y-3">
                <template x-for="(item, index) in items" :key="index">
                    <div @click="item.checked = !item.checked" class="sticker-card bg-white p-4 rounded-xl flex items-center justify-between cursor-pointer">
                        <span class="font-bold" :class="item.checked ? 'line-through opacity-40' : ''" x-text="item.name"></span>
                        <div class="w-6 h-6 border-2 border-ink rounded flex items-center justify-center" :class="item.checked ? 'bg-kikiBlue' : ''">
                            <i data-lucide="check" x-show="item.checked" class="text-white w-4 h-4"></i>
                        </div>
                    </div>
                </template>
            </div>
        </main>

        <button @click="tab = 'calc'" class="fixed right-6 bottom-32 w-14 h-14 bg-starGold border-2 border-ink rounded-full shadow-[4px_4px_0px_0px_#4A3728] flex items-center justify-center active:translate-y-1 active:shadow-none z-50">
            <i data-lucide="calculator"></i>
        </button>

        <div class="fixed bottom-8 left-0 right-0 flex justify-center px-6 z-40">
            <button class="w-full max-w-xs sticker-card bg-lalaPink py-4 rounded-full flex items-center justify-center gap-2 font-black text-lg">
                <i data-lucide="plus-circle"></i>
                <span>新增夢幻行程</span>
            </button>
        </div>

    </div>

    <script>
        // 初始化 Lucide 圖標
        lucide.createIcons();
        
        // 監聽 Alpine.js 更新後重新初始化圖標
        document.addEventListener('alpine:initialized', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
