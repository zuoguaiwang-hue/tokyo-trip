<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kiki & Lala 夢幻旅行助手</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Itim&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --lala-pink: #FFC8DD;
            --kiki-blue: #BDE0FE;
            --star-yellow: #FFF9C4;
        }
        body {
            font-family: 'Quicksand', 'Itim', sans-serif;
            background: linear-gradient(135deg, #fdf2f8 0%, #e0f2fe 100%);
            overscroll-behavior: none;
        }
        .app-shell {
            max-width: 450px;
            height: 100vh;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(15px);
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.85);
            border-radius: 30px;
            border: 2px solid #ffffff;
            box-shadow: 0 10px 25px rgba(255, 182, 193, 0.15);
        }
        .modal-overlay {
            background: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(4px);
        }
        .tab-active { color: #FF99C8; transform: translateY(-3px); transition: all 0.3s; }
        input, select { border-radius: 15px; }
        
        /* 動態星星動畫 */
        .floating-star {
            animation: float 3s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>
<body class="flex justify-center items-center">

<div id="app" class="app-shell w-full relative flex flex-col overflow-hidden shadow-2xl">
    
    <header class="pt-12 pb-6 px-8 flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-700 flex items-center gap-2">
                {{ settings.destination }} <span class="text-yellow-400">★</span>
            </h1>
            <p class="text-[10px] text-pink-400 font-bold uppercase tracking-widest">Little Twin Stars Travel</p>
        </div>
        <button @click="showSettings = true" class="w-12 h-12 rounded-full bg-white shadow-md flex justify-center items-center text-pink-300 hover:scale-110 transition">
            <i data-lucide="sparkles"></i>
        </button>
    </header>

    <main class="flex-1 overflow-y-auto px-6 pb-28">
        
        <div v-if="activeTab === 'itinerary'" class="space-y-4">
            <div class="glass-card p-4 bg-gradient-to-r from-pink-50 to-blue-50 border-none flex justify-between items-center">
                <div class="text-xs text-gray-500">
                    <div class="flex items-center gap-1 font-bold text-pink-400"><i data-lucide="plane-takeoff" class="w-3 h-3"></i> {{ settings.flightOut }}</div>
                    <div class="mt-1 font-bold text-blue-400">{{ settings.startDate }} 起身</div>
                </div>
                <div class="h-8 w-[1px] bg-gray-200"></div>
                <div class="text-xs text-right text-gray-500">
                    <div class="flex items-center gap-1 justify-end font-bold text-pink-400">{{ settings.flightBack }} <i data-lucide="plane-landing" class="w-3 h-3"></i></div>
                    <div class="mt-1 font-bold text-blue-400">共 {{ settings.days }} 天</div>
                </div>
            </div>

            <div class="flex justify-between items-center mt-6">
                <h2 class="text-lg font-bold text-gray-600">行程清單</h2>
                <button @click="addActivity" class="bg-[#BDE0FE] text-blue-600 px-4 py-1 rounded-full text-xs font-bold active:scale-95 transition">
                    + 新增
                </button>
            </div>

            <div v-for="(act, index) in itinerary" :key="index" class="glass-card p-4 space-y-3">
                <div class="flex items-center gap-3">
                    <input type="time" v-model="act.time" class="bg-pink-50 border-none text-xs font-bold text-pink-400 p-2 outline-none">
                    <input v-model="act.location" placeholder="要去哪顆星星呢？" class="flex-1 bg-transparent border-b border-dashed border-gray-200 font-bold text-gray-700 outline-none focus:border-pink-300">
                </div>
                <div class="flex justify-between items-center">
                    <button @click="goMap(act.location)" class="text-[10px] text-blue-400 flex items-center gap-1 bg-blue-50 px-3 py-1 rounded-full">
                        <i data-lucide="map-pin" class="w-3 h-3"></i> 地圖導航
                    </button>
                    <button @click="removeActivity(index)" class="text-gray-300 hover:text-red-300 transition">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </div>
            </div>
        </div>

        <div v-if="activeTab === 'split'" class="space-y-6">
            <h2 class="text-lg font-bold text-gray-600">分帳系統</h2>
            <div class="glass-card p-6 text-center">
                <p class="text-[10px] font-bold text-gray-400 uppercase mb-2">Total Expense</p>
                <input type="number" v-model.number="bill.amount" class="w-full text-4xl font-bold text-center text-pink-400 bg-transparent outline-none mb-6" placeholder="0">
                
                <div class="flex items-center justify-between mb-8">
                    <button @click="bill.people > 1 ? bill.people-- : null" class="w-10 h-10 rounded-full bg-blue-100 text-blue-500 shadow-sm">-</button>
                    <div class="text-center">
                        <span class="text-2xl font-bold text-gray-600">{{ bill.people }}</span>
                        <p class="text-[10px] text-gray-400">人數</p>
                    </div>
                    <button @click="bill.people++" class="w-10 h-10 rounded-full bg-blue-100 text-blue-500 shadow-sm">+</button>
                </div>

                <div class="bg-[#FFF9C4] rounded-3xl p-5 shadow-inner">
                    <p class="text-xs text-yellow-700 font-bold mb-1">每人平均分攤</p>
                    <p class="text-3xl font-bold text-yellow-600">${{ (bill.amount / bill.people).toFixed(0) }}</p>
                </div>
            </div>
        </div>
    </main>

    <nav class="absolute bottom-0 w-full bg-white/80 backdrop-blur-lg border-t border-pink-100 flex justify-around items-center py-5 pb-8">
        <button @click="activeTab = 'itinerary'" :class="activeTab === 'itinerary' ? 'tab-active' : 'text-gray-300'">
            <div class="flex flex-col items-center">
                <i data-lucide="calendar-range"></i>
                <span class="text-[10px] font-bold mt-1">行程表</span>
            </div>
        </button>
        <button @click="activeTab = 'split'" :class="activeTab === 'split' ? 'tab-active' : 'text-gray-300'">
            <div class="flex flex-col items-center">
                <i data-lucide="calculator"></i>
                <span class="text-[10px] font-bold mt-1">分帳</span>
            </div>
        </button>
    </nav>

    <transition name="fade">
        <div v-if="showSettings" class="modal-overlay fixed inset-0 z-50 flex items-center justify-center p-6">
            <div class="glass-card w-full max-w-sm p-8 relative animate-in fade-in zoom-in duration-300">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-gray-700">旅程設定 ✨</h3>
                    <button @click="showSettings = false" class="text-gray-400 hover:text-pink-400">
                        <i data-lucide="x"></i>
                    </button>
                </div>

                <div class="space-y-5">
                    <div>
                        <label class="text-[10px] font-bold text-pink-400 block ml-1 mb-1">目的地</label>
                        <input v-model="settings.destination" class="w-full bg-pink-50 p-3 outline-none font-bold text-gray-600">
                    </div>
                    <div class="grid grid-cols-2 gap-3">
                        <div>
                            <label class="text-[10px] font-bold text-blue-400 block ml-1 mb-1">開始日期</label>
                            <input type="date" v-model="settings.startDate" class="w-full bg-blue-50 p-2 text-xs outline-none">
                        </div>
                        <div>
                            <label class="text-[10px] font-bold text-blue-400 block ml-1 mb-1">天數</label>
                            <input type="number" v-model="settings.days" class="w-full bg-blue-50 p-2 text-xs outline-none">
                        </div>
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-pink-400 block ml-1 mb-1">去程航班 (時間/班次)</label>
                        <input v-model="settings.flightOut" class="w-full bg-pink-50 p-3 outline-none text-sm">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-pink-400 block ml-1 mb-1">回程航班 (時間/班次)</label>
                        <input v-model="settings.flightBack" class="w-full bg-pink-50 p-3 outline-none text-sm">
                    </div>
                </div>

                <button @click="showSettings = false" class="w-full mt-8 bg-gradient-to-r from-pink-300 to-blue-300 text-white font-bold py-3 rounded-full shadow-lg active:scale-95 transition">
                    儲存設定
                </button>
            </div>
        </div>
    </transition>

    <div class="absolute top-20 right-10 floating-star text-yellow-200">★</div>
    <div class="absolute bottom-40 left-5 floating-star text-pink-200 opacity-50" style="animation-delay: 1s;">★</div>

</div>

<script>
    const { createApp, ref, onMounted, updated } = Vue;

    createApp({
        setup() {
            const activeTab = ref('itinerary');
            const showSettings = ref(false);
            
            const settings = ref({
                destination: '首爾',
                startDate: '2026-06-15',
                days: 5,
                flightOut: 'OZ712 12:55',
                flightBack: 'OZ711 10:00'
            });

            const itinerary = ref([
                { time: '14:00', location: '抵達仁川機場' },
                { time: '17:30', location: '明洞商圈' },
                { time: '20:00', location: 'N首爾塔' }
            ]);

            const bill = ref({
                amount: 0,
                people: 2
            });

            const addActivity = () => {
                itinerary.value.push({ time: '12:00', location: '' });
            };

            const removeActivity = (index) => {
                itinerary.value.splice(index, 1);
            };

            const goMap = (loc) => {
                if (!loc) alert('親愛的，還沒輸入地點唷！');
                else window.open(`https://www.google.com/maps/search/${encodeURIComponent(loc)}`, '_blank');
            };

            onMounted(() => {
                lucide.createIcons();
            });

            return {
                activeTab, showSettings, settings, itinerary, bill,
                addActivity, removeActivity, goMap
            };
        },
        updated() {
            lucide.createIcons();
        }
    }).mount('#app');
</script>

<style>
/* Vue Transition 動畫 */
.fade-enter-active, .fade-leave-active { transition: opacity 0.3s ease; }
.fade-enter-from, .fade-leave-to { opacity: 0; }
</style>

</body>
</html>
