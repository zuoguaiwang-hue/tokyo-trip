<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大王與阿婷的甜蜜旅行</title>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --coffee: #8D775F;
            --soft-pink: #FCE4EC;
            --blue-grey: #607D8B;
            --sky-blue: #E3F2FD;
        }
        body {
            font-family: 'Noto Sans TC', 'ZCOOL KuaiLe', cursive;
            background-color: #f5f5f5;
            user-select: none;
        }
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        .cute-card {
            border-radius: 20px;
            border: 2px solid var(--coffee);
        }
        /* 滾輪式調整模擬 */
        .wheel-picker {
            overflow-y: scroll;
            height: 100px;
            scroll-snap-type: y mandatory;
        }
        .wheel-item {
            scroll-snap-align: center;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        /* 隱藏捲軸 */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .tab-active {
            background-color: var(--coffee);
            color: white;
            transform: scale(1.05);
        }
    </style>
</head>
<body class="bg-gray-100">

<div id="app" class="app-container flex flex-col relative pb-20">
    
    <header class="p-6 bg-[#FCE4EC] rounded-b-[40px] shadow-sm">
        <div class="flex justify-between items-center mb-4">
            <input v-model="country" class="text-2xl font-bold bg-transparent border-b-2 border-[#8D775F] text-[#8D775F] focus:outline-none w-1/2">
            <span class="text-4xl">✈️</span>
        </div>
        
        <div class="space-y-2 text-sm text-[#607D8B]">
            <div class="flex items-center gap-2 bg-white/50 p-2 rounded-xl">
                <span>去程:</span>
                <input type="datetime-local" v-model="flightDeparture" class="bg-transparent focus:outline-none">
            </div>
            <div class="flex items-center gap-2 bg-white/50 p-2 rounded-xl">
                <span>回程:</span>
                <input type="datetime-local" v-model="flightReturn" class="bg-transparent focus:outline-none">
            </div>
        </div>
    </header>

    <nav class="flex gap-2 p-4 overflow-x-auto no-scrollbar">
        <button v-for="n in 6" :key="n" 
                @click="currentDay = n"
                :class="['px-5 py-2 rounded-full font-bold whitespace-nowrap transition-all', currentDay === n ? 'tab-active' : 'bg-[#E3F2FD] text-[#607D8B]']">
            Day {{ n }}
        </button>
    </nav>

    <main class="flex-1 px-4 space-y-4">
        <div class="flex justify-between items-center">
            <h2 class="text-[#8D775F] font-bold text-xl">今日行程</h2>
            <button @click="addItinerary" class="bg-[#8D775F] text-white w-8 h-8 rounded-full shadow-lg">+</button>
        </div>

        <div v-for="(item, index) in dailySchedules[currentDay]" :key="index" 
             class="p-4 bg-white border-l-4 border-[#8D775F] shadow-sm rounded-r-2xl relative group">
            <button @click="removeItinerary(index)" class="absolute -top-2 -right-2 bg-red-400 text-white rounded-full w-5 h-5 text-xs">×</button>
            
            <div class="flex gap-2 items-center mb-2">
                <input type="time" v-model="item.time" class="text-sm font-bold text-[#607D8B] border-none focus:outline-none">
                <input v-model="item.location" placeholder="目的地/標題" class="font-bold text-lg w-full focus:outline-none border-b border-dashed border-gray-300">
            </div>
            
            <div class="grid grid-cols-2 gap-2 text-sm">
                <div class="bg-pink-50 p-2 rounded-lg">
                    <p class="text-[10px] text-pink-400 font-bold">必去景點</p>
                    <textarea v-model="item.spots" rows="1" class="w-full bg-transparent resize-none focus:outline-none"></textarea>
                </div>
                <div class="bg-blue-50 p-2 rounded-lg">
                    <p class="text-[10px] text-blue-400 font-bold">必吃美食</p>
                    <textarea v-model="item.food" rows="1" class="w-full bg-transparent resize-none focus:outline-none"></textarea>
                </div>
            </div>

            <button @click="openMap(item.location)" class="mt-2 text-[10px] text-blue-500 underline">🗺️ 開啟導航</button>
        </div>
    </main>

    <section class="m-4 p-6 bg-[#607D8B] rounded-[30px] text-white">
        <h3 class="font-bold mb-4 flex items-center gap-2">
            <span>💰 分帳大王與阿婷</span>
        </h3>
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white/10 p-3 rounded-2xl">
                <p class="text-xs mb-1">大王支付</p>
                <input type="number" v-model="bill.king" class="bg-transparent border-b w-full focus:outline-none">
            </div>
            <div class="bg-white/10 p-3 rounded-2xl">
                <p class="text-xs mb-1">阿婷支付</p>
                <input type="number" v-model="bill.ting" class="bg-transparent border-b w-full focus:outline-none">
            </div>
        </div>
        <div class="mt-4 p-3 bg-white/20 rounded-xl text-center">
            <p v-if="settlement.amount > 0" class="font-bold">
                {{ settlement.payer }} 應給 {{ settlement.receiver }} 
                <span class="text-yellow-300">${{ settlement.amount }}</span> 元
            </p>
            <p v-else class="font-bold">目前兩清喔！🤝</p>
        </div>
    </section>

    <footer class="fixed bottom-0 max-w-[500px] w-full bg-white border-t flex justify-around p-3 text-[10px] text-gray-400">
        <div class="text-[#8D775F] flex flex-col items-center"><span>🏠</span><span>首頁</span></div>
        <div class="flex flex-col items-center"><span>📷</span><span>相簿</span></div>
        <div class="flex flex-col items-center"><span>✏️</span><span>備忘錄</span></div>
    </footer>
</div>

<script>
    const { createApp, ref, computed } = Vue;

    createApp({
        setup() {
            const country = ref('日本 東京');
            const flightDeparture = ref('2026-04-01T08:00');
            const flightReturn = ref('2026-04-06T20:00');
            const currentDay = ref(1);

            // 初始化 6 天的行程數據
            const dailySchedules = ref({
                1: [{ time: '10:00', location: '成田機場', spots: '買交通卡', food: '自動販賣機奶茶' }],
                2: [], 3: [], 4: [], 5: [], 6: []
            });

            // 分帳數據
            const bill = ref({ king: 0, ting: 0 });

            const addItinerary = () => {
                dailySchedules.value[currentDay.value].push({
                    time: '12:00',
                    location: '',
                    spots: '',
                    food: ''
                });
            };

            const removeItinerary = (index) => {
                dailySchedules.value[currentDay.value].splice(index, 1);
            };

            const settlement = computed(() => {
                const total = bill.value.king + bill.value.ting;
                const share = total / 2;
                if (bill.value.king > share) {
                    return { payer: '阿婷', receiver: '大王', amount: (bill.value.king - share).toFixed(0) };
                } else if (bill.value.ting > share) {
                    return { payer: '大王', receiver: '阿婷', amount: (bill.value.ting - share).toFixed(0) };
                }
                return { amount: 0 };
            });

            const openMap = (loc) => {
                if(!loc) return alert('請輸入地點');
                window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(loc)}`, '_blank');
            };

            return {
                country, flightDeparture, flightReturn, currentDay,
                dailySchedules, addItinerary, removeItinerary,
                bill, settlement, openMap
            }
        }
    }).mount('#app');
</script>

</body>
</html>
